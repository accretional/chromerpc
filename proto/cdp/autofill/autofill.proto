syntax = "proto3";

package cdp.autofill;

option go_package = "github.com/accretional/chromerpc/proto/cdp/autofill";

// Autofill domain defines methods for interacting with the browser autofill system.

service AutofillService {
  // Enables the Autofill domain.
  rpc Enable(EnableRequest) returns (EnableResponse);

  // Disables the Autofill domain.
  rpc Disable(DisableRequest) returns (DisableResponse);

  // Triggers autofill on a form field.
  rpc Trigger(TriggerRequest) returns (TriggerResponse);

  // Sets addresses for autofill.
  rpc SetAddresses(SetAddressesRequest) returns (SetAddressesResponse);

  // Subscribes to Autofill domain events.
  rpc SubscribeEvents(SubscribeAutofillEventsRequest) returns (stream AutofillEvent);
}

// ==================== Types ====================

message CreditCard {
  string number = 1;
  string name = 2;
  string expiry_month = 3;
  string expiry_year = 4;
  string cvc = 5;
}

message AddressField {
  string name = 1;
  string value = 2;
}

message Address {
  repeated AddressField fields = 1;
}

// ==================== Requests / Responses ====================

message EnableRequest {
  string session_id = 99;
}
message EnableResponse {}

message DisableRequest {
  string session_id = 99;
}
message DisableResponse {}

message TriggerRequest {
  // The id of the field to trigger autofill on.
  int32 field_id = 1;
  // The frame id of the field (optional).
  string frame_id = 2;
  // The credit card to fill.
  CreditCard card = 3;
  string session_id = 99;
}
message TriggerResponse {}

message SetAddressesRequest {
  repeated Address addresses = 1;
  string session_id = 99;
}
message SetAddressesResponse {}

// ==================== Event Streaming ====================

message SubscribeAutofillEventsRequest {
  string session_id = 1;
}

message AutofillEvent {
  oneof event {
    AddressFormFilledEvent address_form_filled = 1;
  }
}

message AddressFormFilledEvent {
  repeated FilledField filled_fields = 1;
  AddressUI address_ui = 2;
}

message FilledField {
  string html_type = 1;
  string id = 2;
  string name = 3;
  string value = 4;
  string autofill_type = 5;
  string filling_strategy = 6;
  string frame_id = 7;
  int32 field_id = 8;
}

message AddressUI {
  repeated AddressField address_fields = 1;
}
