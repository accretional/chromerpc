syntax = "proto3";

package cdp.profiler;

option go_package = "github.com/accretional/chromerpc/proto/cdp/profiler";

// Profiler domain exposes JavaScript runtime profiling and code coverage.

service ProfilerService {
  // Enable profiling.
  rpc Enable(EnableRequest) returns (EnableResponse);

  // Disable profiling.
  rpc Disable(DisableRequest) returns (DisableResponse);

  // Set sampling interval in microseconds.
  rpc SetSamplingInterval(SetSamplingIntervalRequest) returns (SetSamplingIntervalResponse);

  // Start profiling.
  rpc Start(StartRequest) returns (StartResponse);

  // Stop profiling.
  rpc Stop(StopRequest) returns (StopResponse);

  // Enable precise code coverage.
  rpc StartPreciseCoverage(StartPreciseCoverageRequest) returns (StartPreciseCoverageResponse);

  // Disable precise code coverage.
  rpc StopPreciseCoverage(StopPreciseCoverageRequest) returns (StopPreciseCoverageResponse);

  // Collect coverage data for the current isolate, and resets execution counters.
  rpc TakePreciseCoverage(TakePreciseCoverageRequest) returns (TakePreciseCoverageResponse);

  // Collect coverage data for the current isolate.
  rpc GetBestEffortCoverage(GetBestEffortCoverageRequest) returns (GetBestEffortCoverageResponse);

  // Subscribe to Profiler events.
  rpc SubscribeEvents(SubscribeEventsRequest) returns (stream ProfilerEvent);
}

// ==================== Types ====================

message Profile {
  repeated ProfileNode nodes = 1;
  double start_time = 2;
  double end_time = 3;
  repeated int32 samples = 4;
  repeated int32 time_deltas = 5;
}

message ProfileNode {
  int32 id = 1;
  CallFrame call_frame = 2;
  int32 hit_count = 3;
  repeated int32 children = 4;
  string deopt_reason = 5;
  repeated PositionTickInfo position_ticks = 6;
}

message CallFrame {
  string function_name = 1;
  string script_id = 2;
  string url = 3;
  int32 line_number = 4;
  int32 column_number = 5;
}

message PositionTickInfo {
  int32 line = 1;
  int32 ticks = 2;
}

message ScriptCoverage {
  string script_id = 1;
  string url = 2;
  repeated FunctionCoverage functions = 3;
}

message FunctionCoverage {
  string function_name = 1;
  repeated CoverageRange ranges = 2;
  bool is_block_coverage = 3;
}

message CoverageRange {
  int32 start_offset = 1;
  int32 end_offset = 2;
  int32 count = 3;
}

// ==================== Requests / Responses ====================

message EnableRequest {
  string session_id = 99;
}
message EnableResponse {}

message DisableRequest {
  string session_id = 99;
}
message DisableResponse {}

message SetSamplingIntervalRequest {
  int32 interval = 1;
  string session_id = 99;
}
message SetSamplingIntervalResponse {}

message StartRequest {
  string session_id = 99;
}
message StartResponse {}

message StopRequest {
  string session_id = 99;
}
message StopResponse {
  Profile profile = 1;
}

message StartPreciseCoverageRequest {
  bool call_count = 1;
  bool detailed = 2;
  bool allow_triggered_updates = 3;
  string session_id = 99;
}
message StartPreciseCoverageResponse {
  double timestamp = 1;
}

message StopPreciseCoverageRequest {
  string session_id = 99;
}
message StopPreciseCoverageResponse {}

message TakePreciseCoverageRequest {
  string session_id = 99;
}
message TakePreciseCoverageResponse {
  repeated ScriptCoverage result = 1;
  double timestamp = 2;
}

message GetBestEffortCoverageRequest {
  string session_id = 99;
}
message GetBestEffortCoverageResponse {
  repeated ScriptCoverage result = 1;
}

// ==================== Events ====================

message SubscribeEventsRequest {
  string session_id = 99;
}

message ProfilerEvent {
  oneof event {
    ConsoleProfileStartedEvent console_profile_started = 1;
    ConsoleProfileFinishedEvent console_profile_finished = 2;
    PreciseCoverageDeltaUpdateEvent precise_coverage_delta_update = 3;
  }
}

message ConsoleProfileStartedEvent {
  string id = 1;
  CallFrame location = 2;
  string title = 3;
}

message ConsoleProfileFinishedEvent {
  string id = 1;
  CallFrame location = 2;
  Profile profile = 3;
  string title = 4;
}

message PreciseCoverageDeltaUpdateEvent {
  double timestamp = 1;
  string occasion = 2;
  repeated ScriptCoverage result = 3;
}
