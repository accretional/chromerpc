syntax = "proto3";

package cdp.input;

option go_package = "github.com/accretional/chromerpc/proto/cdp/input";

// Input domain supports interaction with the page's input.

service InputService {
  // Dispatches a key event to the page.
  rpc DispatchKeyEvent(DispatchKeyEventRequest) returns (DispatchKeyEventResponse);

  // Dispatches a mouse event to the page.
  rpc DispatchMouseEvent(DispatchMouseEventRequest) returns (DispatchMouseEventResponse);

  // Dispatches a touch event to the page.
  rpc DispatchTouchEvent(DispatchTouchEventRequest) returns (DispatchTouchEventResponse);

  // Emulates inserting text that doesn't come from a key press (experimental).
  rpc InsertText(InsertTextRequest) returns (InsertTextResponse);

  // Sets whether input events are ignored.
  rpc SetIgnoreInputEvents(SetIgnoreInputEventsRequest) returns (SetIgnoreInputEventsResponse);

  // Dispatches a drag event into the page (experimental).
  rpc DispatchDragEvent(DispatchDragEventRequest) returns (DispatchDragEventResponse);

  // Synthesizes a pinch gesture (experimental).
  rpc SynthesizePinchGesture(SynthesizePinchGestureRequest) returns (SynthesizePinchGestureResponse);

  // Synthesizes a scroll gesture (experimental).
  rpc SynthesizeScrollGesture(SynthesizeScrollGestureRequest) returns (SynthesizeScrollGestureResponse);

  // Synthesizes a tap gesture (experimental).
  rpc SynthesizeTapGesture(SynthesizeTapGestureRequest) returns (SynthesizeTapGestureResponse);

  // Cancels any active dragging in the page (experimental).
  rpc CancelDragging(CancelDraggingRequest) returns (CancelDraggingResponse);

  // Sets the current IME composition (experimental).
  rpc ImeSetComposition(ImeSetCompositionRequest) returns (ImeSetCompositionResponse);
}

// ==================== Types ====================

// Touch point for touch events.
message TouchPoint {
  double x = 1;
  double y = 2;
  double radius_x = 3;
  double radius_y = 4;
  double rotation_angle = 5;
  double force = 6;
  double tangential_pressure = 7;
  int32 tilt_x = 8;
  int32 tilt_y = 9;
  int32 twist = 10;
  double id = 11;
}

// Drag data for drag events.
message DragData {
  repeated DragDataItem items = 1;
  repeated string files = 2;
  int32 drag_operations_mask = 3;
}

message DragDataItem {
  string mime_type = 1;
  string data = 2;
  string title = 3;
  string base_url = 4;
}

// ==================== Requests / Responses ====================

message DispatchKeyEventRequest {
  // Type of the key event.
  string type = 1; // "keyDown","keyUp","rawKeyDown","char"
  // Bit field: Alt=1, Ctrl=2, Meta/Command=4, Shift=8.
  int32 modifiers = 2;
  // Time at which the event occurred.
  double timestamp = 3;
  // Text as generated by processing a virtual key code with a keyboard layout.
  string text = 4;
  // Text that would have been generated by the keyboard if no modifiers were pressed.
  string unmodified_text = 5;
  // Unique key identifier (e.g., 'U+0041').
  string key_identifier = 6;
  // Unique DOM defined string value for each physical key.
  string code = 7;
  // Unique DOM defined string value describing the meaning of the key.
  string key = 8;
  // Windows virtual key code.
  int32 windows_virtual_key_code = 9;
  // Native virtual key code.
  int32 native_virtual_key_code = 10;
  // Whether the event was generated from auto repeat.
  bool auto_repeat = 11;
  // Whether the event was generated from the keypad.
  bool is_keypad = 12;
  // Whether the event was a system key event.
  bool is_system_key = 13;
  // Editing commands to send with the key event.
  repeated string commands = 14;
  // DOM UI Events Location.
  int32 location = 15;
  string session_id = 99;
}
message DispatchKeyEventResponse {}

message DispatchMouseEventRequest {
  // Type of the mouse event.
  string type = 1; // "mousePressed","mouseReleased","mouseMoved","mouseWheel"
  // X coordinate relative to the main frame's viewport in CSS pixels.
  double x = 2;
  // Y coordinate relative to the main frame's viewport in CSS pixels.
  double y = 3;
  // Bit field: Alt=1, Ctrl=2, Meta/Command=4, Shift=8.
  int32 modifiers = 4;
  // Time at which the event occurred.
  double timestamp = 5;
  // Mouse button.
  string button = 6; // "none","left","middle","right","back","forward"
  // A number indicating which buttons are pressed on the mouse.
  int32 buttons = 7;
  // Number of times the mouse button was clicked.
  int32 click_count = 8;
  // The normalized pressure (0..1).
  double force = 9;
  // The normalized tangential pressure (−1..1).
  double tangential_pressure = 10;
  // X tilt (−90..90).
  int32 tilt_x = 11;
  // Y tilt (−90..90).
  int32 tilt_y = 12;
  // Clockwise rotation (0..359).
  int32 twist = 13;
  // X delta for mouse wheel event.
  double delta_x = 14;
  // Y delta for mouse wheel event.
  double delta_y = 15;
  // Pointer type.
  string pointer_type = 16; // "mouse","pen"
  string session_id = 99;
}
message DispatchMouseEventResponse {}

message DispatchTouchEventRequest {
  // Type of the touch event.
  string type = 1; // "touchStart","touchEnd","touchMove","touchCancel"
  // Active touch points on the touch device.
  repeated TouchPoint touch_points = 2;
  // Bit field modifiers.
  int32 modifiers = 3;
  // Time at which the event occurred.
  double timestamp = 4;
  string session_id = 99;
}
message DispatchTouchEventResponse {}

message InsertTextRequest {
  // The text to insert.
  string text = 1;
  string session_id = 99;
}
message InsertTextResponse {}

message SetIgnoreInputEventsRequest {
  bool ignore = 1;
  string session_id = 99;
}
message SetIgnoreInputEventsResponse {}

message DispatchDragEventRequest {
  string type = 1; // "dragEnter","dragOver","drop","dragCancel"
  double x = 2;
  double y = 3;
  DragData data = 4;
  int32 modifiers = 5;
  string session_id = 99;
}
message DispatchDragEventResponse {}

message SynthesizePinchGestureRequest {
  double x = 1;
  double y = 2;
  double scale_factor = 3;
  int32 relative_speed = 4;
  string gesture_source_type = 5; // "default","touch","mouse"
  string session_id = 99;
}
message SynthesizePinchGestureResponse {}

message SynthesizeScrollGestureRequest {
  double x = 1;
  double y = 2;
  double x_distance = 3;
  double y_distance = 4;
  double x_overscroll = 5;
  double y_overscroll = 6;
  bool prevent_fling = 7;
  int32 speed = 8;
  string gesture_source_type = 9;
  int32 repeat_count = 10;
  int32 repeat_delay_ms = 11;
  string interaction_marker_name = 12;
  string session_id = 99;
}
message SynthesizeScrollGestureResponse {}

message SynthesizeTapGestureRequest {
  double x = 1;
  double y = 2;
  int32 duration = 3;
  int32 tap_count = 4;
  string gesture_source_type = 5;
  string session_id = 99;
}
message SynthesizeTapGestureResponse {}

message CancelDraggingRequest {
  string session_id = 99;
}
message CancelDraggingResponse {}

message ImeSetCompositionRequest {
  string text = 1;
  int32 selection_start = 2;
  int32 selection_end = 3;
  int32 replacement_start = 4;
  int32 replacement_end = 5;
  string session_id = 99;
}
message ImeSetCompositionResponse {}
