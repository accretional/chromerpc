syntax = "proto3";

package cdp.backgroundservice;

option go_package = "github.com/accretional/chromerpc/proto/cdp/backgroundservice";

// BackgroundService domain provides access to background service events.

service BackgroundServiceService {
  // Start observing events for a service.
  rpc StartObserving(StartObservingRequest) returns (StartObservingResponse);

  // Stop observing events for a service.
  rpc StopObserving(StopObservingRequest) returns (StopObservingResponse);

  // Set the recording state for a service.
  rpc SetRecording(SetRecordingRequest) returns (SetRecordingResponse);

  // Clear all stored events for a service.
  rpc ClearEvents(ClearEventsRequest) returns (ClearEventsResponse);

  // Subscribe to BackgroundService domain events.
  rpc SubscribeEvents(SubscribeBackgroundServiceEventsRequest) returns (stream BackgroundServiceEvent);
}

// ==================== Types ====================

enum ServiceName {
  SERVICE_NAME_UNSPECIFIED = 0;
  BACKGROUND_FETCH = 1;
  BACKGROUND_SYNC = 2;
  PUSH_MESSAGING = 3;
  NOTIFICATIONS = 4;
  PAYMENT_HANDLER = 5;
  PERIODIC_BACKGROUND_SYNC = 6;
}

// ==================== Requests / Responses ====================

message StartObservingRequest {
  ServiceName service = 1;
}
message StartObservingResponse {}

message StopObservingRequest {
  ServiceName service = 1;
}
message StopObservingResponse {}

message SetRecordingRequest {
  bool should_record = 1;
  ServiceName service = 2;
}
message SetRecordingResponse {}

message ClearEventsRequest {
  ServiceName service = 1;
}
message ClearEventsResponse {}

// ==================== Event Streaming ====================

message SubscribeBackgroundServiceEventsRequest {
  string session_id = 1;
}

message BackgroundServiceEvent {
  oneof event {
    RecordingStateChangedEvent recording_state_changed = 1;
    BackgroundServiceEventReceivedEvent background_service_event_received = 2;
  }
}

message RecordingStateChangedEvent {
  bool is_recording = 1;
  string service = 2;
}

message BackgroundServiceEventReceivedEvent {
  BackgroundServiceEventDetail background_service_event = 1;
}

message BackgroundServiceEventDetail {
  double timestamp = 1;
  string origin = 2;
  string service_worker_registration_id = 3;
  string service = 4;
  string event_name = 5;
  string instance_id = 6;
  repeated EventMetadata event_metadata = 7;
  string storage_key = 8;
}

message EventMetadata {
  string key = 1;
  string value = 2;
}
