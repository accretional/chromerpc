syntax = "proto3";

package cdp.inspector;

option go_package = "github.com/accretional/chromerpc/proto/cdp/inspector";

// Inspector domain provides access to inspector-related functionality.

service InspectorService {
  // Enable inspector domain notifications.
  rpc Enable(EnableRequest) returns (EnableResponse);

  // Disable inspector domain notifications.
  rpc Disable(DisableRequest) returns (DisableResponse);

  // Subscribe to Inspector domain events.
  rpc SubscribeEvents(SubscribeInspectorEventsRequest) returns (stream InspectorEvent);
}

// ==================== Requests / Responses ====================

message EnableRequest {
  string session_id = 99;
}
message EnableResponse {}

message DisableRequest {
  string session_id = 99;
}
message DisableResponse {}

// ==================== Event Streaming ====================

message SubscribeInspectorEventsRequest {
  string session_id = 1;
}

message InspectorEvent {
  oneof event {
    DetachedEvent detached = 1;
    TargetCrashedEvent target_crashed = 2;
    TargetReloadedAfterCrashEvent target_reloaded_after_crash = 3;
  }
}

message DetachedEvent {
  string reason = 1;
}

message TargetCrashedEvent {}

message TargetReloadedAfterCrashEvent {}
