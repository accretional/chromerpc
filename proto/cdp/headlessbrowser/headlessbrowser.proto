syntax = "proto3";

package cdp.headlessbrowser;

option go_package = "github.com/accretional/chromerpc/proto/cdp/headlessbrowser";

// HeadlessBrowser service — high-level browser automation as sequences of steps.
// Automation sequences can be authored as text proto files and reorganized modularly.

service HeadlessBrowserService {
  // Execute a sequence of automation steps in order.
  rpc RunAutomation(AutomationSequence) returns (AutomationResult);

  // Execute a single automation step and return its result.
  // Useful for orchestrators that need to branch on step results.
  rpc ExecuteStep(AutomationStep) returns (StepResult);
}

// A complete automation sequence: an ordered list of steps.
message AutomationSequence {
  string name = 1;
  repeated AutomationStep steps = 2;
}

// A single automation step. Each step is one of the supported actions.
message AutomationStep {
  string label = 1;
  oneof action {
    SetViewport set_viewport = 2;
    Navigate navigate = 3;
    Wait wait = 4;
    Screenshot screenshot = 5;
    EvaluateScript evaluate_script = 6;
    Click click = 7;
    TypeText type_text = 8;
    WaitForSelector wait_for_selector = 9;
    Reload reload = 10;
    ScrollTo scroll_to = 11;
    TypeKeyByKey type_key_by_key = 12;
    PressKey press_key = 13;
    FullPageScreenshot full_page_screenshot = 14;
    OpenTab open_tab = 15;
    CloseTab close_tab = 16;
    SwitchTab switch_tab = 17;
    DownloadFile download_file = 18;
  }
}

// Set the browser viewport dimensions.
message SetViewport {
  int32 width = 1;
  int32 height = 2;
  double device_scale_factor = 3;
  bool mobile = 4;
}

// Navigate to a URL.
message Navigate {
  string url = 1;
}

// Wait for a fixed duration.
message Wait {
  int32 milliseconds = 1;
}

// Capture a screenshot and save to a file path on the server.
message Screenshot {
  string output_path = 1;
  // PNG or JPEG.
  string format = 2;
  int32 quality = 3;
  bool full_page = 4;
}

// Evaluate JavaScript in the page context.
message EvaluateScript {
  string expression = 1;
}

// Click at coordinates or a CSS selector.
message Click {
  double x = 1;
  double y = 2;
  string selector = 3;
}

// Type text (simulates keyboard input via insertText).
message TypeText {
  string text = 1;
  string selector = 2;
}

// Wait for a CSS selector to appear in the DOM.
message WaitForSelector {
  string selector = 1;
  int32 timeout_ms = 2;
}

// Reload the current page.
message Reload {
  bool ignore_cache = 1;
}

// Scroll to coordinates.
message ScrollTo {
  double x = 1;
  double y = 2;
}

// Type text key-by-key with realistic delays between keystrokes.
message TypeKeyByKey {
  string text = 1;
  // Delay in milliseconds between each keystroke. Default 50.
  int32 delay_ms = 2;
  // Optional selector to focus before typing.
  string selector = 3;
}

// Press a special key (Enter, Tab, Escape, Backspace, etc.).
message PressKey {
  string key = 1;
}

// Capture a full-page screenshot (resizes viewport to full page height).
message FullPageScreenshot {
  string output_path = 1;
  string format = 2;
  int32 quality = 3;
}

// Open a new browser tab with a URL. Returns target_id in script_result.
message OpenTab {
  string url = 1;
}

// Close a tab by target_id. If empty, closes the current tab.
message CloseTab {
  string target_id = 1;
}

// Switch to a tab by target_id. Attaches a new session.
message SwitchTab {
  string target_id = 1;
}

// Download a file from a URL and save to disk.
message DownloadFile {
  string url = 1;
  string output_path = 2;
}

// Result of a full automation sequence run.
message AutomationResult {
  bool success = 1;
  repeated StepResult step_results = 2;
  string error = 3;
}

// Result of a single step.
message StepResult {
  string label = 1;
  bool success = 2;
  string error = 3;
  // For screenshot steps, the bytes of the captured image.
  bytes screenshot_data = 4;
  // For evaluate_script steps, the return value.
  string script_result = 5;
}
