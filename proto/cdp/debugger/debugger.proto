syntax = "proto3";

package cdp.debugger;

option go_package = "github.com/accretional/chromerpc/proto/cdp/debugger";

// Debugger domain exposes JavaScript debugging capabilities. It allows
// setting and removing breakpoints, stepping through execution, exploring
// stack traces, etc.

service DebuggerService {
  // Enables debugger for the given page.
  rpc Enable(EnableRequest) returns (EnableResponse);

  // Disables debugger for the given page.
  rpc Disable(DisableRequest) returns (DisableResponse);

  // Sets JavaScript breakpoint at given location specified by URL or URL regex.
  rpc SetBreakpointByUrl(SetBreakpointByUrlRequest) returns (SetBreakpointByUrlResponse);

  // Sets JavaScript breakpoint at a given location.
  rpc SetBreakpoint(SetBreakpointRequest) returns (SetBreakpointResponse);

  // Removes JavaScript breakpoint.
  rpc RemoveBreakpoint(RemoveBreakpointRequest) returns (RemoveBreakpointResponse);

  // Returns possible locations for breakpoint.
  rpc GetPossibleBreakpoints(GetPossibleBreakpointsRequest) returns (GetPossibleBreakpointsResponse);

  // Returns source for the script with given id.
  rpc GetScriptSource(GetScriptSourceRequest) returns (GetScriptSourceResponse);

  // Edits JavaScript source live.
  rpc SetScriptSource(SetScriptSourceRequest) returns (SetScriptSourceResponse);

  // Searches for given string in script content.
  rpc SearchInContent(SearchInContentRequest) returns (SearchInContentResponse);

  // Stops on the next JavaScript statement.
  rpc Pause(PauseRequest) returns (PauseResponse);

  // Resumes JavaScript execution.
  rpc Resume(ResumeRequest) returns (ResumeResponse);

  // Steps over the statement.
  rpc StepOver(StepOverRequest) returns (StepOverResponse);

  // Steps into the function call.
  rpc StepInto(StepIntoRequest) returns (StepIntoResponse);

  // Steps out of the function call.
  rpc StepOut(StepOutRequest) returns (StepOutResponse);

  // Defines pause on exceptions state.
  rpc SetPauseOnExceptions(SetPauseOnExceptionsRequest) returns (SetPauseOnExceptionsResponse);

  // Evaluates expression on a given call frame.
  rpc EvaluateOnCallFrame(EvaluateOnCallFrameRequest) returns (EvaluateOnCallFrameResponse);

  // Makes backend skip steps in scripts with given patterns.
  rpc SetBlackboxPatterns(SetBlackboxPatternsRequest) returns (SetBlackboxPatternsResponse);

  // Enables or disables async call stacks tracking.
  rpc SetAsyncCallStackDepth(SetAsyncCallStackDepthRequest) returns (SetAsyncCallStackDepthResponse);

  // Activates / deactivates all breakpoints on the page.
  rpc SetBreakpointsActive(SetBreakpointsActiveRequest) returns (SetBreakpointsActiveResponse);

  // Subscribe to debugger events.
  rpc SubscribeEvents(SubscribeDebuggerEventsRequest) returns (stream DebuggerEvent);
}

// ==================== Types ====================

// Location in the source code.
message Location {
  // Script identifier as reported in the Debugger.scriptParsed.
  string script_id = 1;
  // Line number in the script (0-based).
  int32 line_number = 2;
  // Column number in the script (0-based).
  int32 column_number = 3;
}

// Location in the source code with an optional type hint for break locations.
message BreakLocation {
  string script_id = 1;
  int32 line_number = 2;
  int32 column_number = 3;
  // Allowed values: "debuggerStatement", "call", "return".
  string type = 4;
}

// JavaScript call frame. Array of call frames form the call stack.
message CallFrame {
  // Call frame identifier. This identifier is only valid while the virtual machine is paused.
  string call_frame_id = 1;
  // Name of the JavaScript function called on this call frame.
  string function_name = 2;
  // Location in the source code.
  Location function_location = 3;
  // Location in the source code.
  Location location = 4;
  // JavaScript script name or url.
  string url = 5;
  // Scope chain for this call frame.
  repeated Scope scope_chain = 6;
  // `this` object for this call frame (RemoteObject as JSON string).
  string this = 7;
  // The value being returned (RemoteObject as JSON string), if the function is at return point.
  string return_value = 8;
}

// Scope description.
message Scope {
  // Scope type: "global", "local", "with", "closure", "catch", "block", "script", "eval", "module", "wasm-expression-stack".
  string type = 1;
  // Object representing the scope (RemoteObject as JSON string).
  string object = 2;
  string name = 3;
  Location start_location = 4;
  Location end_location = 5;
}

// Search match for resource.
message SearchMatch {
  // Line number in resource content.
  double line_number = 1;
  // Line with match content.
  string line_content = 2;
}

// ==================== Requests / Responses ====================

message EnableRequest {
  string session_id = 99;
}
message EnableResponse {
  // Unique identifier of the debugger.
  string debugger_id = 1;
}

message DisableRequest {
  string session_id = 99;
}
message DisableResponse {}

message SetBreakpointByUrlRequest {
  // Line number to set breakpoint at.
  int32 line_number = 1;
  // URL of the resources to set breakpoint on.
  string url = 2;
  // Regex pattern for the URLs of the resources to set breakpoints on.
  string url_regex = 3;
  // Script hash of the resources to set breakpoint on.
  string script_hash = 4;
  // Offset in the line to set breakpoint at.
  int32 column_number = 5;
  // Expression to use as a breakpoint condition.
  string condition = 6;
  string session_id = 99;
}

message SetBreakpointByUrlResponse {
  // Id of the created breakpoint for further reference.
  string breakpoint_id = 1;
  // List of the locations this breakpoint resolved into upon addition.
  repeated Location locations = 2;
}

message SetBreakpointRequest {
  // Location to set breakpoint in.
  Location location = 1;
  // Expression to use as a breakpoint condition.
  string condition = 2;
  string session_id = 99;
}

message SetBreakpointResponse {
  // Id of the created breakpoint for further reference.
  string breakpoint_id = 1;
  // Location this breakpoint resolved into.
  Location actual_location = 2;
}

message RemoveBreakpointRequest {
  string breakpoint_id = 1;
  string session_id = 99;
}
message RemoveBreakpointResponse {}

message GetPossibleBreakpointsRequest {
  // Start of range to search possible breakpoint locations in.
  Location start = 1;
  // End of range to search possible breakpoint locations in (excluding).
  Location end = 2;
  // Only consider locations which are in the same (non-nested) function as start.
  bool restrict_to_function = 3;
  string session_id = 99;
}

message GetPossibleBreakpointsResponse {
  // List of the possible breakpoint locations.
  repeated BreakLocation locations = 1;
}

message GetScriptSourceRequest {
  // Id of the script to get source for.
  string script_id = 1;
  string session_id = 99;
}

message GetScriptSourceResponse {
  // Script source (empty in case of Wasm bytecode).
  string script_source = 1;
  // Wasm bytecode (encoded as base64).
  string bytecode = 2;
}

message SetScriptSourceRequest {
  // Id of the script to edit.
  string script_id = 1;
  // New content of the script.
  string script_source = 2;
  // If true the change will not actually be applied. Dry run may be used to get result description without actually modifying the code.
  bool dry_run = 3;
  string session_id = 99;
}

message SetScriptSourceResponse {
  // New stack trace in case editing has happened while VM was stopped.
  repeated CallFrame call_frames = 1;
  // Whether current call stack was modified after applying the changes.
  bool stack_changed = 2;
  // Exception details if any.
  string exception_details = 3; // JSON-encoded ExceptionDetails
}

message SearchInContentRequest {
  // Id of the script to search in.
  string script_id = 1;
  // String to search for.
  string query = 2;
  // If true, search is case sensitive.
  bool case_sensitive = 3;
  // If true, treats string parameter as regex.
  bool is_regex = 4;
  string session_id = 99;
}

message SearchInContentResponse {
  // List of search matches.
  repeated SearchMatch result = 1;
}

message PauseRequest {
  string session_id = 99;
}
message PauseResponse {}

message ResumeRequest {
  // Set to true to terminate execution upon resuming.
  bool terminate_on_resume = 1;
  string session_id = 99;
}
message ResumeResponse {}

message StepOverRequest {
  // Skip pauses in the called functions.
  repeated Location skip_list = 1;
  string session_id = 99;
}
message StepOverResponse {}

message StepIntoRequest {
  // Debugger will pause on the execution of the first async task which was scheduled before next pause.
  bool break_on_async_call = 1;
  // Skip pauses in the called functions.
  repeated Location skip_list = 2;
  string session_id = 99;
}
message StepIntoResponse {}

message StepOutRequest {
  string session_id = 99;
}
message StepOutResponse {}

message SetPauseOnExceptionsRequest {
  // Pause on exceptions mode: "none", "uncaught", "all".
  string state = 1;
  string session_id = 99;
}
message SetPauseOnExceptionsResponse {}

message EvaluateOnCallFrameRequest {
  // Call frame identifier to evaluate on.
  string call_frame_id = 1;
  // Expression to evaluate.
  string expression = 2;
  // String object group name to put result into.
  string object_group = 3;
  // Whether the result should be returned by value (JSON).
  bool return_by_value = 4;
  // Whether preview should be generated for the result.
  bool generate_preview = 5;
  // Whether to throw an exception if side effect cannot be ruled out.
  bool throw_on_side_effect = 6;
  // Terminate execution after timing out.
  double timeout = 7;
  string session_id = 99;
}

message EvaluateOnCallFrameResponse {
  // Object wrapper for the evaluation result.
  string result = 1; // RemoteObject as JSON string
  // Exception details.
  string exception_details = 2; // JSON-encoded ExceptionDetails
}

message SetBlackboxPatternsRequest {
  // Array of regexps that will be used to check script url for blackbox state.
  repeated string patterns = 1;
  string session_id = 99;
}
message SetBlackboxPatternsResponse {}

message SetAsyncCallStackDepthRequest {
  // Maximum depth of async call stacks. Setting to 0 will effectively disable collecting async call stacks.
  int32 max_depth = 1;
  string session_id = 99;
}
message SetAsyncCallStackDepthResponse {}

message SetBreakpointsActiveRequest {
  // New value for breakpoints active state.
  bool active = 1;
  string session_id = 99;
}
message SetBreakpointsActiveResponse {}

// ==================== Events ====================

message SubscribeDebuggerEventsRequest {
  string session_id = 1;
}

message DebuggerEvent {
  oneof event {
    ScriptParsedEvent script_parsed = 1;
    ScriptFailedToParseEvent script_failed_to_parse = 2;
    PausedEvent paused = 3;
    ResumedEvent resumed = 4;
  }
}

message ScriptParsedEvent {
  string script_id = 1;
  string url = 2;
  int32 start_line = 3;
  int32 start_column = 4;
  int32 end_line = 5;
  int32 end_column = 6;
  int32 execution_context_id = 7;
  string hash = 8;
  // Embedder-specific auxiliary data (JSON-encoded).
  string execution_context_aux_data = 9;
  bool is_live_edit = 10;
  string source_map_url = 11;
  bool has_source_url = 12;
  bool is_module = 13;
  int32 length = 14;
  string stack_trace = 15; // JSON-encoded StackTrace
  int32 code_offset = 16;
  string script_language = 17;
  string embedder_name = 18;
}

message ScriptFailedToParseEvent {
  string script_id = 1;
  string url = 2;
  int32 start_line = 3;
  int32 start_column = 4;
  int32 end_line = 5;
  int32 end_column = 6;
  int32 execution_context_id = 7;
  string hash = 8;
  string execution_context_aux_data = 9;
  string source_map_url = 10;
  bool has_source_url = 11;
  bool is_module = 12;
  int32 length = 13;
  string stack_trace = 14; // JSON-encoded StackTrace
  int32 code_offset = 15;
  string script_language = 16;
  string embedder_name = 17;
}

message PausedEvent {
  // Call stack the virtual machine stopped on.
  repeated CallFrame call_frames = 1;
  // Pause reason: "ambiguous", "assert", "CSPViolation", "debugCommand", "DOM", "EventListener", "exception", "instrumentation", "OOM", "other", "promiseRejection", "XHR".
  string reason = 2;
  // Object containing break-specific auxiliary properties (JSON-encoded).
  string data = 3;
  // Hit breakpoints IDs.
  repeated string hit_breakpoints = 4;
  // Async stack trace, if any.
  string async_stack_trace = 5; // JSON-encoded StackTrace
  // Async stack trace, if any (JSON-encoded).
  string async_stack_trace_id = 6;
}

message ResumedEvent {}
